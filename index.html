<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
<title>Tetris English Class</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
</head>

<body>

<div id="gameWrapper">

<h1>Tetris English Challenge</h1>





<div id="startScreen">

<h2>English Tetris Challenge</h2>

<button id="startBtn">

START GAME

</button>

<input id="playerName"

placeholder="Write your name"

style="padding:10px;margin-top:10px;">

<input id="roomCode"

placeholder="Class Code"

style="padding:10px;margin-top:10px;">

</div>

<div id="container">

<div id="firstTryBox">
<h3>⭐ FIRST TRY</h3>
<div id="firstTryName">---</div>
<div id="firstTryScore">-</div>
</div>

<canvas id="game"></canvas>

<div id="scoreboard">

<div id="ranking">
<h2>🏆 Students Ranking</h2>
<ul id="playersList"></ul>
</div>

<p id="score">0</p>

<div id="timerBox">
⏱ TIME
<div id="gameTimerDisplay">480</div>
</div>

</div>

</div> <!-- 🔴 AQUI SE CIERRA CONTAINER -->

<div id="quiz" class="hidden">

<h2 id="question"></h2>

<div id="quizTimerBox">
⏱ TIME: <span id="quizTimerText">10</span>
</div>
  
<div id="answers"></div>

</div>

<div id="gameOver" class="hidden">

<h1>GAME OVER</h1>

<button class="againBtn" onclick="playAgain()">
PLAY AGAIN
</button>

</div>

<!-- 🏆 SALA FINAL SEPARADA -->
<div id="finalRoom" style="display:none">

<h2>🏆 FINAL RANKING</h2>

<canvas id="confettiCanvas"></canvas>

<div id="finalRanking"></div>

</div>
  

<audio id="victorySound" preload="auto">
<source src="victory.mp3" type="audio/mpeg">
</audio>

<audio id="gameOverSound" preload="auto">
<source src="gameover.mp3" type="audio/mpeg">
</audio>


  
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const finalRoom = params.get("final");

if(finalRoom){

roomCode = finalRoom;

// ocultar menú inicial
document.getElementById("startScreen").style.display = "none";

// ocultar juego
document.getElementById("container").style.display = "none";

// mostrar sala final
document.getElementById("finalRoom").style.display = "block";

showFinalRanking();

</div>

<div id="mobileControls">

<button id="leftBtn">⬅️</button>
<button id="rotateBtn">🔄</button>
<button id="rightBtn">➡️</button>
<button id="downBtn">⬇️</button>
